<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>网络诊断</title>
    <style>
        body{font-family:-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;padding:15px;font-size:14px}
        .item{padding:10px;margin:8px 0;border-radius:8px;background:#161b22}
        .ok{color:#51cf66}.fail{color:#f85149}.info{color:#58a6ff}
        .btn{width:100%;padding:14px;background:#238636;border:none;color:#fff;font-size:16px;border-radius:8px;margin:10px 0}
    </style>
</head>
<body>
    <h2>🔍 网络诊断</h2>
    <button class="btn" onclick="test()">开始诊断</button>
    <div id="log"></div>

<script>
function log(msg, cls){
    document.getElementById('log').innerHTML += '<div class="item '+(cls||'')+'">'+msg+'</div>';
}

function jp(url, timeout){
    return new Promise(function(resolve){
        var cb = '_t'+Date.now();
        window[cb] = function(d){
            delete window[cb]; 
            var s = document.getElementById(cb);
            if(s) s.remove();
            resolve(d);
        };
        var s = document.createElement('script');
        s.id = cb;
        s.src = url + (url.indexOf('?')>=0?'&':'?') + 'callback=' + cb;
        s.onerror = function(){
            delete window[cb]; 
            if(s.parentNode) s.remove();
            resolve(null);
        };
        document.head.appendChild(s);
        setTimeout(function(){
            if(window[cb]){ delete window[cb]; if(s.parentNode) s.remove(); resolve(null); }
        }, timeout||8000);
    });
}

async function test(){
    document.getElementById('log').innerHTML = '';
    log('开始诊断...', 'info');
    
    // 测试1: 新浪JSONP实时
    log('📡 测试1: 新浪JSONP sz000725');
    var d = await jp('https://hq.sinajs.cn/list=sz000725', 8000);
    if(d && d['sz000725']){
        log('✅ 新浪JSONP实时 成功! 价格:'+d['sz000725'].price, 'ok');
    } else {
        log('❌ 新浪JSONP实时 失败', 'fail');
    }
    
    // 测试2: 新浪JSONP K线
    log('📡 测试2: 新浪JSONP K线 sz000725');
    var d2 = await jp('https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=sz000725&scale=240&ma=no&datalen=5', 8000);
    if(d2 && Array.isArray(d2) && d2.length > 0){
        log('✅ 新浪JSONP K线 成功! 条数:'+d2.length, 'ok');
    } else {
        log('❌ 新浪JSONP K线 失败', 'fail');
    }
    
    // 测试3: fetch 腾讯
    log('📡 测试3: fetch 腾讯 sz000725');
    try {
        var r = await fetch('https://qt.gtimg.cn/q=sz000725');
        var t = await r.text();
        if(t.length > 100){
            log('✅ fetch腾讯 成功! 长度:'+t.length, 'ok');
        } else {
            log('❌ fetch腾讯 返回太短', 'fail');
        }
    } catch(e){
        log('❌ fetch腾讯 失败: '+e.message, 'fail');
    }
    
    // 测试4: 新浪图片标签方式
    log('📡 测试4: img标签方式');
    try {
        var imgResult = await new Promise(function(resolve){
            var img = new Image();
            img.onload = function(){ resolve('ok'); };
            img.onerror = function(){ resolve('fail'); };
            img.src = 'https://hq.sinajs.cn/list=sz000725?' + Date.now();
            setTimeout(function(){ resolve('timeout'); }, 5000);
        });
        log('  结果: ' + imgResult, imgResult==='ok'?'ok':'fail');
    } catch(e){
        log('❌ img方式失败', 'fail');
    }
    
    log('诊断完成！请截图发给我', 'info');
}

test();
</script>
</body>
</html>
