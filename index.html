<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>股票分析</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#c9d1d9;padding:10px;padding-bottom:100px}
        .header{text-align:center;padding:15px;background:#161b22;border-radius:12px;margin-bottom:12px}
        .header h1{font-size:20px;color:#58a6ff}
        .card{background:#161b22;border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid #21262d}
        .name{font-size:16px;font-weight:bold;color:#f0f6fc}
        .code{font-size:11px;color:#8b949e}
        .price-row{display:flex;align-items:baseline;gap:8px;margin-top:5px}
        .price{font-size:26px;font-weight:bold}
        .up{color:#ff6b6b}.down{color:#51cf66}
        .change{font-size:13px;padding:2px 8px;border-radius:4px}
        .change.up{color:#ff6b6b;background:rgba(255,107,107,0.12)}
        .change.down{color:#51cf66;background:rgba(81,207,102,0.12)}
        .sig-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:8px;margin-top:10px}
        .sig-row.buy{background:rgba(81,207,102,0.1);border:1px solid rgba(81,207,102,0.3)}
        .sig-row.sell{background:rgba(255,107,107,0.1);border:1px solid rgba(255,107,107,0.3)}
        .sig-row.watch{background:rgba(139,148,158,0.1);border:1px solid rgba(139,148,158,0.2)}
        .sig-name{font-size:14px;font-weight:bold}
        .sig-score{font-size:20px;font-weight:bold}
        .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:8px}
        .g-item{background:#0d1117;padding:6px;border-radius:5px;text-align:center}
        .g-label{font-size:10px;color:#8b949e;display:block}
        .g-val{font-size:12px;color:#f0f6fc;font-weight:bold;display:block;margin-top:2px}
        .tag-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
        .tag{padding:2px 8px;border-radius:10px;font-size:10px}
        .tag.g{background:rgba(81,207,102,0.15);color:#3fb950}
        .tag.r{background:rgba(255,107,107,0.15);color:#f85149}
        .bottom{position:fixed;bottom:8px;left:10px;right:10px;background:#161b22;border-radius:10px;padding:10px;display:flex;justify-content:space-around;text-align:center;border:1px solid #21262d}
        .b-label{font-size:11px;color:#8b949e}
        .b-count{font-size:20px;font-weight:bold}
        .btn{position:fixed;bottom:75px;right:15px;width:44px;height:44px;border-radius:50%;background:#238636;border:none;color:#fff;font-size:20px;cursor:pointer;z-index:100}
        .btn:active{transform:scale(0.9)}
        .loading{text-align:center;padding:30px;color:#8b949e}
        .spin{display:inline-block;width:24px;height:24px;border:3px solid #21262d;border-top-color:#58a6ff;border-radius:50%;animation:s 0.8s linear infinite}
        @keyframes s{to{transform:rotate(360deg)}}
        .info{font-size:10px;color:#484f58;text-align:center;margin-top:3px}
    </style>
</head>
<body>
    <div class="header"><h1>📈 股票技术分析</h1><div id="status" class="info">加载中...</div></div>
    <div id="app"><div class="loading"><div class="spin"></div><div style="margin-top:10px;">加载中...</div></div></div>
    <button class="btn" onclick="main()">🔄</button>
    <div class="bottom">
        <div><div class="b-label">🟢 做多</div><div class="b-count" style="color:#51cf66" id="bc">-</div></div>
        <div><div class="b-label">🔍 观望</div><div class="b-count" style="color:#8b949e" id="wc">-</div></div>
        <div><div class="b-label">🔴 卖出</div><div class="b-count" style="color:#ff6b6b" id="sc">-</div></div>
    </div>

<script>
const S={"601868":"黄河旋风","000725":"京东方A","000791":"甘肃能源","002176":"江特电机"};

// 用JSONP方式绕过跨域 - 新浪
function fetchSina(code){
    return new Promise((resolve)=>{
        let p=code.startsWith('6')?'sh':'sz';
        let cb='_sina'+Date.now()+Math.random().toString(36).slice(2);
        window[cb]=function(data){
            delete window[cb];
            let d=data[`${p}${code}`];
            if(d){resolve({pr:d.price,pc:d.yestclose,ch:d.changepercent,src:'新浪'});}
            else{resolve(null);}
        };
        let s=document.createElement('script');
        s.src=`https://hq.sinajs.cn/list=${p}${code}&callback=${cb}`;
        s.onerror=()=>{delete window[cb];resolve(null);};
        document.head.appendChild(s);
        setTimeout(()=>{if(window[cb]){delete window[cb];resolve(null);}},5000);
    });
}

// 腾讯接口
async function fetchQQ(code){
    try{
        let p=code.startsWith('6')?'sh':'sz';
        let r=await fetch(`https://qt.gtimg.cn/q=${p}${code}`);
        let t=await r.text();
        let m=t.match(/"([^"]*)"/);
        if(m){let d=m[1].split('~');if(d.length>35)return{pr:+d[3],pc:+d[4],ch:+d[32],src:'腾讯'};}
    }catch(e){}
    return null;
}

// 获取实时价格
async function getPrice(code){
    let r=await fetchSina(code);
    if(r)return r;
    r=await fetchQQ(code);
    return r;
}

// K线用东方财富
async function getKline(code){
    let mkt=code.startsWith('6')?1:0;
    try{
        let r=await fetch(`https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=${mkt}.${code}&klt=101&fqt=1&lmt=300&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57&ut=7eea3edcaed734be9fbf2444c1a1997e`);
        let j=await r.json();
        if(j?.data?.klines&&j.data.klines.length>=5){
            return j.data.klines.map(k=>{let p=k.split(',');return{o:+p[1],c:+p[2],h:+p[3],l:+p[4],v:+p[5]};});
        }
    }catch(e){}
    return null;
}

function calc(d){
    if(!d||d.length<5)return null;
    let c=d.map(x=>x.c),h=d.map(x=>x.h),l=d.map(x=>x.l),v=d.map(x=>x.v),len=c.length;
    let sm=(a,n)=>{let s=a.slice(-Math.min(n,a.length));return s.reduce((x,y)=>x+y,0)/s.length;};
    let ma5=sm(c,Math.min(5,len)),ma10=sm(c,Math.min(10,len)),ma20=sm(c,Math.min(20,len));
    let em=(a,n)=>{if(a.length<2)return a[a.length-1];let k=2/(n+1),r=a[0];for(let i=1;i<a.length;i++)r=a[i]*k+r*(1-k);return r;};
    let ema12=em(c,Math.min(12,len)),ema26=em(c,Math.min(26,len)),macd=ema12-ema26;
    let ln=Math.min(9,len),lMin=Math.min(...l.slice(-ln)),hMax=Math.max(...h.slice(-ln));
    let rsv=hMax!=lMin?(c[len-1]-lMin)/(hMax-lMin)*100:50;
    let k=50;for(let i=Math.max(0,len-27);i<len;i++){let mn=Math.min(...l.slice(Math.max(0,i-8),i+1));let mx=Math.max(...h.slice(Math.max(0,i-8),i+1));let rs=mx!=mn?(d[i].c-mn)/(mx-mn)*100:50;k=k*2/3+rs*1/3;}
    let kd=(k+50+50)/3;
    let g=0,ls=0,rn=Math.min(14,len-1);
    for(let i=len-rn;i<len;i++){let df=d[i].c-d[i-1].c;if(df>0)g+=df;else ls-=df;}
    let r=ls>0?(g/rn)/(ls/rn):100,rsi=100-100/(1+r);
    let bn=Math.min(20,len),bs=c.slice(-bn),bbm=bs.reduce((x,y)=>x+y,0)/bn;
    let std=Math.sqrt(bs.reduce((x,y)=>x+(y-bbm)**2,0)/bn);
    let vm=v.slice(-Math.min(5,len)).reduce((x,y)=>x+y,0)/Math.min(5,len),vr=vm>0?v[len-1]/vm:1;
    return{ma5,ma10,ma20,macd,k,kd,rsi,bbu:bbm+2*std,bbl:bbm-2*std,vr,cc:c[len-1],pc:c[len-2],cnt:len};
}

function sc(pd,ind){
    if(!ind)return{sg:'K线不足',sc:0,dt:[],tr:'',m5:'-',m20:'-',mc:'-',kk:'-',kd:'-',rs:'-',cn:0};
    let s=0,dt=[],tr='';
    if(pd.pr>ind.ma5)s+=0.5;else s-=0.5;
    if(pd.pr>ind.ma20)s+=0.5;else s-=0.5;
    if(ind.ma5>ind.ma10&&ind.ma10>ind.ma20){s+=1;dt.push('均线多头');tr='多头';}
    else if(ind.ma5<ind.ma10&&ind.ma10<ind.ma20){s-=1;dt.push('均线空头');tr='空头';}
    else if(ind.ma5>ind.ma20){s+=0.5;tr='偏多';}else{s-=0.5;tr='偏空';}
    if(ind.macd>0)s+=0.5;else s-=0.5;
    if(ind.k<20){s+=1;dt.push('KDJ超卖');}else if(ind.k>80){s-=1;dt.push('KDJ超买');}
    if(ind.rsi<25){s+=1.5;dt.push('RSI超卖');}else if(ind.rsi>75){s-=1.5;dt.push('RSI超买');}
    if(pd.pr<=ind.bbl){s+=1.5;dt.push('触及下轨');}else if(pd.pr>=ind.bbu){s-=1.5;dt.push('触及上轨');}
    if(ind.vr>1.5&&pd.pr>ind.pc*1.02){s+=1;dt.push('放量上涨');}
    let sg;if(s>=4)sg='强烈买入';else if(s>=2)sg='买入';else if(s>=0.5)sg='偏多';else if(s>-0.5)sg='观望';else if(s>-2)sg='偏空';else if(s>-4)sg='卖出';else sg='强烈卖出';
    return{sg,sc:+s.toFixed(1),dt:dt.slice(0,4),tr,m5:ind.ma5.toFixed(2),m20:ind.ma20.toFixed(2),mc:ind.macd.toFixed(3),kk:ind.k.toFixed(1),kd:ind.kd.toFixed(1),rs:ind.rsi.toFixed(1),cn:ind.cnt};
}

function card(code,name,pd,an){
    if(!pd)return`<div class="card"><div class="name">${name}</div><div class="code">${code}</div><div style="color:#f85149;font-size:12px;">获取失败</div></div>`;
    let cl=pd.ch>=0?'up':'down',sg=pd.ch>=0?'+':'';
    let bg='watch';if(an.sg.includes('买入')||an.sg.includes('偏多'))bg='buy';else if(an.sg.includes('卖出')||an.sg.includes('偏空'))bg='sell';
    let scl=an.sc>0?'#51cf66':(an.sc<0?'#ff6b6b':'#8b949e');
    return`<div class="card"><div><span class="name">${name}</span> <span class="code">${code}</span> <span style="font-size:9px;color:#484f58">${pd.src} [${an.cn}条]</span></div>
    <div class="price-row"><span class="price ${cl}">${pd.pr.toFixed(2)}</span><span class="change ${cl}">${sg}${pd.ch.toFixed(2)}%</span></div>
    <div class="sig-row ${bg}"><span class="sig-name">${an.sg}</span><span class="sig-score" style="color:${scl}">${an.sc>=0?'+':''}${an.sc}</span></div>
    <div style="font-size:11px;color:#8b949e;">${an.tr}</div>
    <div class="grid"><div class="g-item"><span class="g-label">MA5</span><span class="g-val">${an.m5}</span></div><div class="g-item"><span class="g-label">MA20</span><span class="g-val">${an.m20}</span></div><div class="g-item"><span class="g-label">MACD</span><span class="g-val">${an.mc}</span></div><div class="g-item"><span class="g-label">K</span><span class="g-val">${an.kk}</span></div><div class="g-item"><span class="g-label">D</span><span class="g-val">${an.kd}</span></div><div class="g-item"><span class="g-label">RSI</span><span class="g-val">${an.rs}</span></div></div>
    ${an.dt.length?`<div class="tag-row">${an.dt.map(d=>`<span class="tag ${d.includes('多')||d.includes('卖')||d.includes('下轨')||d.includes('放量')?'g':'r'}">${d}</span>`).join('')}</div>`:''}</div>`;
}

async function main(){
    document.getElementById('app').innerHTML='<div class="loading"><div class="spin"></div><div style="margin-top:10px;">加载中...</div></div>';
    let h='',b=0,s=0,w=0;
    for(let[code,name]of Object.entries(S)){
        try{
            let pd=await getPrice(code);
            if(!pd){h+=`<div class="card"><div class="name">${name}</div><div class="code">${code}</div><div style="color:#f85149;font-size:12px;">实时数据失败</div></div>`;continue;}
            let kd=await getKline(code);
            let ind=calc(kd);
            let an=ind?sc(pd,ind):{sg:'K线不足',sc:0,dt:[],tr:'',m5:'-',m20:'-',mc:'-',kk:'-',kd:'-',rs:'-',cn:kd?kd.length:0};
            if(an.sg.includes('买入')||an.sg.includes('偏多'))b++;else if(an.sg.includes('卖出')||an.sg.includes('偏空'))s++;else w++;
            h+=card(code,name,pd,an);
            await new Promise(r=>setTimeout(r,200));
        }catch(e){h+=`<div class="card"><div style="color:#f85149;">${name} 错误</div></div>`;}
    }
    document.getElementById('app').innerHTML=h;
    document.getElementById('bc').textContent=b;
    document.getElementById('wc').textContent=w;
    document.getElementById('sc').textContent=s;
    document.getElementById('status').textContent=new Date().toLocaleTimeString('zh-CN');
}

main();
setInterval(main,300000);
</script>
</body>
</html>
