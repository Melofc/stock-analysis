<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>股票分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #0d1117; color: #c9d1d9; padding: 10px; padding-bottom: 90px; }
        .header { text-align: center; padding: 15px; background: #161b22; border-radius: 12px; margin-bottom: 12px; }
        .header h1 { font-size: 20px; color: #58a6ff; }
        .card { background: #161b22; border-radius: 10px; padding: 14px; margin-bottom: 10px; border: 1px solid #21262d; }
        .top { display: flex; justify-content: space-between; align-items: flex-start; }
        .name { font-size: 16px; font-weight: bold; color: #f0f6fc; }
        .code { font-size: 11px; color: #8b949e; display: block; }
        .price { font-size: 24px; font-weight: bold; }
        .up { color: #ff6b6b; } .down { color: #51cf66; }
        .signal-box { padding: 8px 12px; border-radius: 6px; margin-top: 8px; display: flex; justify-content: space-between; align-items: center; }
        .buy-bg { background: rgba(81,207,102,0.1); border: 1px solid rgba(81,207,102,0.3); }
        .sell-bg { background: rgba(255,107,107,0.1); border: 1px solid rgba(255,107,107,0.3); }
        .watch-bg { background: rgba(139,148,158,0.1); border: 1px solid rgba(139,148,158,0.2); }
        .sig-text { font-size: 14px; font-weight: bold; }
        .score { font-size: 20px; font-weight: bold; }
        .indicators { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-top: 8px; }
        .ind { background: #0d1117; padding: 6px; border-radius: 5px; text-align: center; }
        .ind-label { font-size: 10px; color: #8b949e; }
        .ind-val { font-size: 12px; color: #f0f6fc; font-weight: bold; }
        .details { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px; }
        .tag { padding: 2px 8px; border-radius: 10px; font-size: 10px; }
        .tag-bull { background: rgba(81,207,102,0.15); color: #3fb950; }
        .tag-bear { background: rgba(255,107,107,0.15); color: #f85149; }
        .bottom { position: fixed; bottom: 8px; left: 10px; right: 10px; background: #161b22; border-radius: 10px; padding: 10px; display: flex; justify-content: space-around; text-align: center; border: 1px solid #21262d; }
        .b-label { font-size: 11px; color: #8b949e; }
        .b-count { font-size: 18px; font-weight: bold; }
        .refresh { position: fixed; bottom: 70px; right: 15px; width: 42px; height: 42px; border-radius: 50%; background: #238636; border: none; color: #fff; font-size: 20px; cursor: pointer; }
        .loading { text-align: center; padding: 30px; color: #8b949e; }
        .spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #21262d; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header"><h1>📈 股票技术分析</h1><div style="font-size:11px;color:#8b949e;margin-top:4px;" id="timeShow"></div></div>
    <div id="container"><div class="loading"><div class="spinner"></div><div style="margin-top:10px;">加载中...</div></div></div>
    <button class="refresh" onclick="load()">🔄</button>
    <div class="bottom">
        <div><div class="b-label">🟢 做多</div><div class="b-count" style="color:#51cf66" id="buyNum">-</div></div>
        <div><div class="b-label">🔍 观望</div><div class="b-count" style="color:#8b949e" id="watchNum">-</div></div>
        <div><div class="b-label">🔴 卖出</div><div class="b-count" style="color:#ff6b6b" id="sellNum">-</div></div>
    </div>
<script>
const S = {"601868":"黄河旋风","000725":"京东方A","000791":"甘肃能源","002176":"江特电机"};
const CACHE = {};
function pf(code){return code.startsWith('6')?'sh':'sz';}
async function getPrice(code){
    let p=pf(code);
    try{
        let r=await fetch(`https://hq.sinajs.cn/list=${p}${code}`,{headers:{'Referer':'https://finance.sina.com.cn/'}});
        let t=await r.text(); let m=t.match(/"([^"]*)"/);
        if(m){let d=m[1].split(','); if(d.length>9&&d[3]){let pr=+d[3],pc=+d[2]; if(pr>0)return{price:pr,prevClose:pc,changePct:pc>0?(pr-pc)/pc*100:0};}}
    }catch(e){}
    try{
        let r=await fetch(`https://qt.gtimg.cn/q=${p}${code}`);
        let t=await r.text(); let m=t.match(/"([^"]*)"/);
        if(m){let d=m[1].split('~'); if(d.length>35)return{price:+d[3],prevClose:+d[4],changePct:+d[32]};}
    }catch(e){}
    return null;
}
async function getKline(code){
    let n=Date.now();
    if(CACHE[code]&&(n-CACHE[code].t)<3600000)return CACHE[code].d;
    let p=pf(code);
    try{
        let r=await fetch(`https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=${p}${code}&scale=240&ma=no&datalen=300`);
        let d=await r.json();
        if(d&&d.length>20){let rd=d.map(x=>({date:x.day,open:+x.open,close:+x.close,high:+x.high,low:+x.low,volume:+x.volume}));CACHE[code]={d:rd,t:n};return rd;}
    }catch(e){}
    return null;
}
function calc(kd){
    if(!kd||kd.length<20)return null;
    let c=kd.map(x=>x.close),h=kd.map(x=>x.high),l=kd.map(x=>x.low),v=kd.map(x=>x.volume);
    let len=c.length,last=kd[len-1],prev=kd[len-2];
    function sm(a,n){let s=a.slice(-Math.min(n,a.length));return s.reduce((x,y)=>x+y,0)/s.length;}
    function em(a,n){if(a.length<2)return a[a.length-1];let k=2/(n+1),r=a[0];for(let i=1;i<a.length;i++)r=a[i]*k+r*(1-k);return r;}
    let ma5=sm(c,5),ma10=sm(c,10),ma20=sm(c,20);
    let ema12=em(c,12),ema26=em(c,26),macd=ema12-ema26;
    let kdjN=Math.min(9,len),lMin=Math.min(...l.slice(-kdjN)),hMax=Math.max(...h.slice(-kdjN));
    let rsv=hMax!=lMin?(last.close-lMin)/(hMax-lMin)*100:50;
    let k=50; for(let i=Math.max(0,len-27);i<len;i++){let lmn=Math.min(...l.slice(Math.max(0,i-8),i+1));let hmx=Math.max(...h.slice(Math.max(0,i-8),i+1));let rs=hmx!=lmn?(kd[i].close-lmn)/(hmx-lmn)*100:50;k=k*2/3+rs*1/3;}
    let d=(k+50+50)/3,j=3*k-2*d;
    let gains=0,losses=0,rsiN=Math.min(14,len-1);
    for(let i=len-rsiN;i<len;i++){let diff=kd[i].close-kd[i-1].close;if(diff>0)gains+=diff;else losses-=diff;}
    let rs=losses>0?(gains/rsiN)/(losses/rsiN):100,rsi=100-100/(1+rs);
    let bn=Math.min(20,len),bs=c.slice(-bn),bbm=bs.reduce((x,y)=>x+y,0)/bn;
    let std=Math.sqrt(bs.reduce((x,y)=>x+(y-bbm)**2,0)/bn);
    let vm=v.slice(-5).reduce((x,y)=>x+y,0)/5,vr=vm>0?last.volume/vm:1;
    return{ma5,ma10,ma20,macd,k,d,j,rsi,bbu:bbm+2*std,bbl:bbm-2*std,volRatio:vr,close:last.close,prevClose:prev.close};
}
function score(rt,ind){
    if(!ind)return{sig:'⚠️数据不足',sc:0,det:[],tr:''};
    let sc=0,det=[],p=rt.price,tr='';
    if(p>ind.ma5)sc+=0.5;else sc-=0.5;
    if(p>ind.ma20)sc+=0.5;else sc-=0.5;
    if(ind.ma5>ind.ma10&&ind.ma10>ind.ma20){sc+=1;det.push('均线多头');tr='多头排列';}
    else if(ind.ma5<ind.ma10&&ind.ma10<ind.ma20){sc-=1;det.push('均线空头');tr='空头排列';}
    else if(ind.ma5>ind.ma20){sc+=0.5;tr='偏多';}else{sc-=0.5;tr='偏空';}
    if(ind.macd>0)sc+=0.5;else sc-=0.5;
    if(ind.k<20){sc+=1;det.push('KDJ超卖');}else if(ind.k>80){sc-=1;det.push('KDJ超买');}
    if(ind.rsi<25){sc+=1.5;det.push('RSI超卖');}else if(ind.rsi>75){sc-=1.5;det.push('RSI超买');}
    if(p<=ind.bbl){sc+=1.5;det.push('触及下轨');}else if(p>=ind.bbu){sc-=1.5;det.push('触及上轨');}
    if(ind.volRatio>1.5&&p>ind.prevClose*1.02){sc+=1;det.push('放量上涨');}
    let sig;
    if(sc>=4)sig='✅✅强烈买入';else if(sc>=2)sig='✅买入';else if(sc>=0.5)sig='🟢偏多';
    else if(sc>-0.5)sig='🔍观望';else if(sc>-2)sig='🟠偏空';else if(sc>-4)sig='❌卖出';else sig='❌❌强烈卖出';
    return{sig,sc:+sc.toFixed(1),det:det.slice(0,4),tr,ma5:ind.ma5.toFixed(2),ma20:ind.ma20.toFixed(2),macd:ind.macd.toFixed(3),k:ind.k.toFixed(1),d:ind.d.toFixed(1),rsi:ind.rsi.toFixed(1)};
}
async function load(){
    document.getElementById('container').innerHTML='<div class="loading"><div class="spinner"></div><div style="margin-top:10px;">刷新中...</div></div>';
    let h='',b=0,se=0,w=0;
    for(let[code,name]of Object.entries(S)){
        try{
            let rt=await getPrice(code);
            if(!rt){h+=`<div class="card"><div class="name">${name}<span class="code">${code}</span></div><div style="color:#f85149;font-size:12px;">⚠️无数据</div></div>`;continue;}
            let kd=await getKline(code),ind=calc(kd),an=ind?score(rt,ind):{sig:'⚠️数据不足',sc:0,det:[],tr:'',ma5:'-',ma20:'-',macd:'-',k:'-',d:'-',rsi:'-'};
            if(an.sig.includes('买入')||an.sig.includes('偏多'))b++;else if(an.sig.includes('卖出')||an.sig.includes('偏空'))se++;else w++;
            let cls=rt.changePct>=0?'up':'down',sg=rt.changePct>=0?'+':'';
            let bc='watch-bg'; if(an.sig.includes('买入')||an.sig.includes('偏多'))bc='buy-bg'; else if(an.sig.includes('卖出')||an.sig.includes('偏空'))bc='sell-bg';
            h+=`<div class="card"><div class="top"><div><div class="name">${name}</div><div class="code">${code}</div></div><div style="text-align:right;"><div class="price ${cls}">${rt.price.toFixed(2)}</div><div style="font-size:12px;color:${cls==='up'?'#ff6b6b':'#51cf66'}">${sg}${rt.changePct.toFixed(2)}%</div></div></div>
            <div class="signal-box ${bc}"><span class="sig-text">${an.sig}</span><span class="score" style="color:${an.sc>0?'#51cf66':an.sc<0?'#ff6b6b':'#8b949e'}">${an.sc>=0?'+':''}${an.sc}</span></div>
            <div style="font-size:11px;color:#8b949e;margin-bottom:6px;">${an.tr}</div>
            <div class="indicators"><div class="ind"><div class="ind-label">MA5</div><div class="ind-val">${an.ma5}</div></div><div class="ind"><div class="ind-label">MA20</div><div class="ind-val">${an.ma20}</div></div><div class="ind"><div class="ind-label">MACD</div><div class="ind-val">${an.macd}</div></div><div class="ind"><div class="ind-label">K</div><div class="ind-val">${an.k}</div></div><div class="ind"><div class="ind-label">D</div><div class="ind-val">${an.d}</div></div><div class="ind"><div class="ind-label">RSI</div><div class="ind-val">${an.rsi}</div></div></div>
            ${an.det.length?`<div class="details">${an.det.map(d=>{let c=d.includes('多')||d.includes('金')||d.includes('超卖')||d.includes('下轨')||d.includes('放量')?'tag-bull':'tag-bear';return`<span class="tag ${c}">${d}</span>`;}).join('')}</div>`:''}</div>`;
            await new Promise(r=>setTimeout(r,200));
        }catch(e){h+=`<div class="card" style="color:#f85149;">${name}错误</div>`;}
    }
    document.getElementById('container').innerHTML=h;
    document.getElementById('buyNum').textContent=b;
    document.getElementById('watchNum').textContent=w;
    document.getElementById('sellNum').textContent=se;
    document.getElementById('timeShow').textContent='更新: '+new Date().toLocaleTimeString('zh-CN');
}
function t(){document.getElementById('timeShow').textContent=new Date().toLocaleTimeString('zh-CN');}
t();setInterval(t,30000);load();setInterval(load,300000);
</script>
</body>
</html>
