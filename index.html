<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>K线诊断</title>
    <style>
        body{font-family:-apple-system,sans-serif;background:#0d1117;color:#c9d1d9;padding:15px;font-size:14px}
        .item{padding:10px;margin:8px 0;border-radius:8px;background:#161b22}
        .ok{color:#51cf66}.fail{color:#f85149}
        .btn{width:100%;padding:14px;background:#238636;border:none;color:#fff;font-size:16px;border-radius:8px;margin:10px 0}
    </style>
</head>
<body>
    <h2>🔍 K线数据诊断</h2>
    <button class="btn" onclick="test()">开始诊断</button>
    <div id="log"></div>

<script>
function log(msg, cls){
    document.getElementById('log').innerHTML += '<div class="item '+(cls||'')+'">'+msg+'</div>';
}

async function test(){
    document.getElementById('log').innerHTML = '';
    log('开始诊断...', 'ok');
    
    var codes = ['000725', '600172'];
    
    for(var i=0; i<codes.length; i++){
        var code = codes[i];
        var p = code.startsWith('6')?'sh':'sz';
        
        // 测试新浪K线
        log('📡 新浪K线 ' + code);
        try {
            var url = 'https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=' + p + code + '&scale=240&ma=no&datalen=300';
            var resp = await fetch(url);
            var text = await resp.text();
            log('  响应长度: ' + text.length, text.length>100?'ok':'fail');
            log('  前200字符: ' + text.substring(0,200));
            
            try {
                var data = JSON.parse(text);
                if(Array.isArray(data)){
                    log('  ✅ 解析成功! 条数: ' + data.length, data.length>=20?'ok':'fail');
                    if(data.length > 0){
                        log('  第一条日期: ' + data[0].day);
                        log('  最后一条日期: ' + data[data.length-1].day);
                    }
                } else {
                    log('  ❌ 不是数组: ' + typeof data, 'fail');
                }
            } catch(e){
                log('  ❌ JSON解析失败: ' + e.message, 'fail');
            }
        } catch(e){
            log('  ❌ 请求失败: ' + e.message, 'fail');
        }
        
        // 测试东方财富K线
        log('📡 东方财富K线 ' + code);
        try {
            var mkt = code.startsWith('6')?1:0;
            var url2 = 'https://push2his.eastmoney.com/api/qt/stock/kline/get?secid=' + mkt + '.' + code + '&klt=101&fqt=1&lmt=300&fields1=f1,f2&fields2=f51,f52,f53,f54,f55&ut=7eea3edcaed734be9fbf2444c1a1997e';
            var resp2 = await fetch(url2);
            var data2 = await resp2.json();
            if(data2 && data2.data && data2.data.klines){
                log('  ✅ 成功! 条数: ' + data2.data.klines.length, data2.data.klines.length>=20?'ok':'fail');
            } else {
                log('  ❌ 无数据: ' + JSON.stringify(data2).substring(0,100), 'fail');
            }
        } catch(e){
            log('  ❌ 请求失败: ' + e.message, 'fail');
        }
    }
    
    log('诊断完成！', 'ok');
}

test();
</script>
</body>
</html>
