<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>股票量化分析</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#c9d1d9;padding:12px;max-width:600px;margin:0 auto}
        .header{text-align:center;padding:15px;background:#161b22;border-radius:12px;margin-bottom:12px}
        .header h1{font-size:20px;color:#58a6ff}
        .input-row{display:flex;gap:8px;margin-bottom:12px}
        .input-row input{flex:1;padding:12px;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#f0f6fc;font-size:16px}
        .input-row select{padding:12px;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#f0f6fc;font-size:14px}
        .btn{width:100%;padding:14px;background:#238636;border:none;color:#fff;font-size:16px;border-radius:8px;cursor:pointer;margin-bottom:15px}
        .btn:active{opacity:.8}
        .card{background:#161b22;border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid #21262d}
        .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
        .metric{text-align:center;background:#0d1117;padding:10px;border-radius:8px}
        .metric .val{font-size:20px;font-weight:bold;color:#f0f6fc}
        .metric .label{font-size:10px;color:#8b949e}
        .score-bar{background:#21262d;border-radius:10px;height:24px;margin:10px 0;overflow:hidden}
        .score-fill{height:100%;border-radius:10px;transition:width 0.5s}
        .signal{text-align:center;font-size:22px;font-weight:bold;padding:10px}
        .advice{background:#0d1117;padding:12px;border-radius:8px;margin:10px 0;font-size:14px}
        .scores-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
        .score-item{background:#0d1117;padding:8px;border-radius:6px;text-align:center}
        .score-item .sname{font-size:10px;color:#8b949e}
        .score-item .sval{font-size:14px;font-weight:bold}
        .details{font-size:11px;color:#8b949e;line-height:1.8;margin-top:10px}
        .loading{text-align:center;padding:30px;color:#8b949e}
        .spin{display:inline-block;width:24px;height:24px;border:3px solid #21262d;border-top-color:#58a6ff;border-radius:50%;animation:s .8s linear infinite}
        @keyframes s{to{transform:rotate(360deg)}}
        .info{font-size:10px;color:#484f58;text-align:center;margin-top:15px}
        .err{color:#f85149;text-align:center;padding:15px}
    </style>
</head>
<body>
    <div class="header"><h1>📈 股票量化分析</h1></div>
    
    <div class="input-row">
        <input type="text" id="codeInput" placeholder="输入6位股票代码" maxlength="6" value="600172">
        <select id="presetSelect" onchange="selectPreset()">
            <option value="600172">黄河旋风</option>
            <option value="000725">京东方A</option>
            <option value="000791">甘肃能源</option>
            <option value="002176">江特电机</option>
            <option value="605358">立昂微</option>
            <option value="600519">贵州茅台</option>
            <option value="300750">宁德时代</option>
        </select>
    </div>
    
    <button class="btn" onclick="analyze()">🔍 开始分析</button>
    <div id="result"></div>
    <div class="info">数据来源：腾讯财经 | 仅供参考</div>

<script>
function selectPreset(){
    document.getElementById('codeInput').value = document.getElementById('presetSelect').value;
}

function pf(c){return c.startsWith('6')?'sh':'sz';}

// 所有数据都用 fetch 方式获取

async function getTencentData(code){
    var p = pf(code);
    try {
        var resp = await fetch('https://qt.gtimg.cn/q=' + p + code);
        var text = await resp.text();
        var match = text.match(/"([^"]*)"/);
        if(match){
            var parts = match[1].split('~');
            if(parts.length > 49){
                return {
                    name: parts[1] || code,
                    price: parseFloat(parts[3]) || 0,
                    prevClose: parseFloat(parts[4]) || 0,
                    open: parseFloat(parts[5]) || 0,
                    high: parseFloat(parts[33]) || 0,
                    low: parseFloat(parts[34]) || 0,
                    changePct: parseFloat(parts[32]) || 0,
                    turnover: parseFloat(parts[38]) || 0,
                    volRatio: parseFloat(parts[49]) || 1,
                    totalMv: parseFloat(parts[45]) || 100
                };
            }
        }
    } catch(e){
        console.log('腾讯数据获取失败:', e);
    }
    return null;
}

async function getKlineSina(code){
    var p = pf(code);
    try {
        var resp = await fetch('https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=' + p + code + '&scale=240&ma=no&datalen=120');
        var data = await resp.json();
        if(data && Array.isArray(data) && data.length >= 20){
            return data.map(function(x){
                return {
                    c: parseFloat(x.close),
                    h: parseFloat(x.high),
                    l: parseFloat(x.low),
                    v: parseFloat(x.volume)
                };
            });
        }
    } catch(e){
        console.log('新浪K线获取失败:', e);
    }
    return null;
}

function calcIndicators(data){
    if(!data || data.length < 20) return null;
    
    var closes = data.map(function(d){return d.c;});
    var highs = data.map(function(d){return d.h;});
    var lows = data.map(function(d){return d.l;});
    var volumes = data.map(function(d){return d.v;});
    var len = closes.length;
    var last = closes[len-1];
    
    function sma(arr, n){
        var s = arr.slice(-Math.min(n, arr.length));
        var sum = 0;
        for(var i=0;i<s.length;i++) sum += s[i];
        return sum / s.length;
    }
    
    function ema(arr, n){
        if(arr.length < 2) return arr[arr.length-1];
        var k = 2/(n+1);
        var r = arr[0];
        for(var i=1;i<arr.length;i++) r = arr[i]*k + r*(1-k);
        return r;
    }
    
    var ma5 = sma(closes, 5);
    var ma10 = sma(closes, 10);
    var ma20 = sma(closes, 20);
    var ma60 = sma(closes, Math.min(60, len));
    var ema12 = ema(closes, 12);
    var ema26 = ema(closes, 26);
    var dif = ema12 - ema26;
    
    var deaArr = [];
    for(var i=0;i<closes.length;i++){
        var e12 = ema(closes.slice(0,i+1), 12);
        var e26 = ema(closes.slice(0,i+1), 26);
        deaArr.push(e12 - e26);
    }
    var deaVal = ema(deaArr, 9);
    var macd = 2*(dif - deaVal);
    
    var ln = Math.min(9, len);
    var lMin = Math.min.apply(null, lows.slice(-ln));
    var hMax = Math.max.apply(null, highs.slice(-ln));
    var rsv = hMax != lMin ? (last - lMin)/(hMax - lMin)*100 : 50;
    
    var k = 50;
    for(var i=Math.max(0, len-27); i<len; i++){
        var mn = Math.min.apply(null, lows.slice(Math.max(0,i-8), i+1));
        var mx = Math.max.apply(null, highs.slice(Math.max(0,i-8), i+1));
        var rs = mx != mn ? (data[i].c - mn)/(mx - mn)*100 : 50;
        k = k*2/3 + rs*1/3;
    }
    var d = (k + 50 + 50)/3;
    var j = 3*k - 2*d;
    
    var gains = 0, losses = 0;
    var rn = Math.min(14, len-1);
    for(var i=len-rn; i<len; i++){
        var df = data[i].c - data[i-1].c;
        if(df > 0) gains += df;
        else losses -= df;
    }
    var rsVal = losses > 0 ? (gains/rn)/(losses/rn) : 100;
    var rsi = 100 - 100/(1+rsVal);
    
    var bn = Math.min(20, len);
    var bs = closes.slice(-bn);
    var bbm = 0;
    for(var i=0;i<bs.length;i++) bbm += bs[i];
    bbm /= bn;
    var variance = 0;
    for(var i=0;i<bs.length;i++) variance += Math.pow(bs[i]-bbm, 2);
    var std = Math.sqrt(variance/bn);
    var bbu = bbm + 2*std;
    var bbl = bbm - 2*std;
    var bollPos = (last - bbl)/(bbu - bbl)*100;
    
    var vm = 0;
    var vs = volumes.slice(-5);
    for(var i=0;i<vs.length;i++) vm += vs[i];
    vm /= 5;
    var vr = vm > 0 ? volumes[len-1]/vm : 1;
    
    var idx20 = Math.max(0, len-21);
    var pct20 = (last - closes[idx20])/closes[idx20]*100;
    
    return {
        ma5: ma5, ma10: ma10, ma20: ma20, ma60: ma60,
        dif: dif, dea: deaVal, macd: macd,
        k: k, d: d, j: j, rsi: rsi,
        bbu: bbu, bbl: bbl, bbm: bbm, bollPos: bollPos,
        vr: vr, last: last, pct20: pct20
    };
}

function getScore(ind, pctChg, turnover, mv){
    if(!ind) return {scores:{}, total:0, signal:'数据不足', advice:''};
    
    var scores = {};
    var k = ind.k, rsi = ind.rsi, close = ind.last;
    
    var ma = 0;
    if(close > ind.ma5) ma += 0.3; else ma -= 0.3;
    if(close > ind.ma20) ma += 0.4; else ma -= 0.4;
    if(ind.ma5 > ind.ma10 && ind.ma10 > ind.ma20) ma += 1.8;
    else if(ind.ma5 < ind.ma10 && ind.ma10 < ind.ma20) ma -= 1.8;
    scores['均线'] = Math.max(-2.5, Math.min(2.5, ma));
    
    var mc = 0;
    if(ind.dif > ind.dea) mc += 1.5; else mc -= 1.5;
    if(ind.dif > 0) mc += 0.3; else mc -= 0.3;
    scores['MACD'] = Math.max(-2, Math.min(2, mc));
    
    var kdj = 0;
    if(k < 20) kdj += 0.5; else if(k > 80) kdj -= 0.5;
    if(ind.j < 0) kdj += 0.3; else if(ind.j > 100) kdj -= 0.3;
    scores['KDJ'] = Math.max(-1.5, Math.min(1.5, kdj));
    
    var rs = 0;
    if(rsi < 25) rs += 1; else if(rsi < 35) rs += 0.5;
    else if(rsi > 75) rs -= 1; else if(rsi > 65) rs -= 0.5;
    scores['RSI'] = Math.max(-1, Math.min(1, rs));
    
    var bl = 0;
    if(close >= ind.bbm) bl += 0.3; else bl -= 0.3;
    if(close <= ind.bbl) bl += 1.5; else if(close >= ind.bbu) bl -= 1.5;
    scores['布林'] = Math.max(-1.5, Math.min(1.5, bl));
    
    var tr = 0, trv = turnover || 0;
    if(trv >= 3 && trv <= 7) tr += pctChg > 0 ? 0.8 : 0.3;
    else if(trv > 15) tr -= 1;
    else if(trv < 1) tr -= 0.3;
    scores['换手率'] = Math.max(-1, Math.min(1, tr));
    
    var vr = 0, vrv = ind.vr || 1;
    if(vrv >= 1.5 && vrv < 2.5) vr += pctChg > 0 ? 0.7 : -0.3;
    else if(vrv >= 5) vr -= 1;
    scores['量比'] = Math.max(-1, Math.min(1, vr));
    
    var total = 0;
    for(var key in scores) total += scores[key];
    total = Math.round(total * 10) / 10;
    
    var signal, advice;
    if(total >= 4){ signal = '✅✅ 强烈买入'; advice = '多项指标共振向上，可积极建仓。止损设MA20下方3%。'; }
    else if(total >= 2){ signal = '✅ 买入信号'; advice = '技术面偏多，可适量建仓，关注量能持续性。'; }
    else if(total >= 0.5){ signal = '🟢 偏多持有'; advice = '趋势偏多但不够强势，持仓持有，空仓小仓试探。'; }
    else if(total > -0.5){ signal = '🔍 观望'; advice = '多空均衡方向不明，建议空仓等待。'; }
    else if(total > -2){ signal = '🟠 偏空谨慎'; advice = '趋势偏弱，重仓者减仓至3成以下。'; }
    else if(total > -4){ signal = '❌ 卖出信号'; advice = '技术面转弱，建议分批卖出止损。'; }
    else{ signal = '❌❌ 强烈卖出'; advice = '多项指标共振向下，果断清仓。'; }
    
    return {scores:scores, total:total, signal:signal, advice:advice};
}

async function analyze(){
    var code = document.getElementById('codeInput').value.trim();
    if(!code || code.length != 6 || !code.match(/^\d{6}$/)){
        document.getElementById('result').innerHTML = '<div class="err">请输入6位数字股票代码</div>';
        return;
    }
    
    var resultDiv = document.getElementById('result');
    resultDiv.innerHTML = '<div class="loading"><div class="spin"></div><div style="margin-top:10px;">分析中...</div></div>';
    
    try {
        // 获取腾讯数据（实时价格+市值+换手率+量比）
        var td = await getTencentData(code);
        if(!td || td.price <= 0){
            resultDiv.innerHTML = '<div class="err">❌ 无法获取实时数据，请检查股票代码或稍后重试</div>';
            return;
        }
        
        // 获取K线数据
        var kl = await getKlineSina(code);
        if(!kl || kl.length < 20){
            resultDiv.innerHTML = '<div class="err">❌ K线数据不足（需要至少20个交易日）<br>已获取' + (kl ? kl.length : 0) + '条</div>';
            return;
        }
        
        // 计算指标
        var ind = calcIndicators(kl);
        if(!ind){
            resultDiv.innerHTML = '<div class="err">❌ 指标计算失败</div>';
            return;
        }
        
        // 评分
        var result = getScore(ind, td.changePct, td.turnover, td.totalMv);
        
        // 渲染
        var html = '';
        html += '<div class="metrics">';
        html += '<div class="metric"><div class="val">¥' + td.price.toFixed(2) + '</div><div class="label">现价</div></div>';
        var cc = td.changePct >= 0 ? '#ff6b6b' : '#51cf66';
        html += '<div class="metric"><div class="val" style="color:' + cc + '">' + (td.changePct>=0?'+':'') + td.changePct.toFixed(2) + '%</div><div class="label">涨跌幅</div></div>';
        html += '<div class="metric"><div class="val">' + td.totalMv.toFixed(0) + '亿</div><div class="label">总市值</div></div>';
        html += '</div>';
        
        var pct = (result.total + 10) / 20 * 100;
        var color = result.total > 0 ? '#51cf66' : (result.total < 0 ? '#ff6b6b' : '#8b949e');
        html += '<div class="score-bar"><div class="score-fill" style="width:' + pct + '%;background:' + color + '"></div></div>';
        html += '<div class="signal" style="color:' + color + '">' + result.signal + ' <small>(' + (result.total>=0?'+':'') + result.total + ')</small></div>';
        html += '<div class="advice">💡 ' + result.advice + '</div>';
        html += '<div style="font-size:11px;color:#8b949e;margin-bottom:8px;">换手率:' + td.turnover.toFixed(2) + '% | 量比:' + td.volRatio.toFixed(2) + ' | ' + td.name + '</div>';
        
        html += '<div class="scores-grid">';
        for(var name in result.scores){
            var val = result.scores[name];
            var c = val > 0 ? '#51cf66' : (val < 0 ? '#ff6b6b' : '#8b949e');
            html += '<div class="score-item"><div class="sname">' + name + '</div><div class="sval" style="color:' + c + '">' + (val>=0?'+':'') + val.toFixed(1) + '</div></div>';
        }
        html += '</div>';
        
        html += '<div class="details">';
        html += '📊 今开:' + td.open.toFixed(2) + ' 最高:' + td.high.toFixed(2) + ' 最低:' + td.low.toFixed(2) + '<br>';
        html += '📊 MA5:' + ind.ma5.toFixed(2) + ' MA10:' + ind.ma10.toFixed(2) + ' MA20:' + ind.ma20.toFixed(2) + ' MA60:' + ind.ma60.toFixed(2) + '<br>';
        html += '📊 MACD: DIF=' + ind.dif.toFixed(4) + ' DEA=' + ind.dea.toFixed(4) + '<br>';
        html += '📊 KDJ: K=' + ind.k.toFixed(1) + ' D=' + ind.d.toFixed(1) + ' J=' + ind.j.toFixed(1) + '<br>';
        html += '📊 RSI(6): ' + ind.rsi.toFixed(1) + '<br>';
        html += '📊 布林: 上轨=' + ind.bbu.toFixed(2) + ' 中轨=' + ind.bbm.toFixed(2) + ' 下轨=' + ind.bbl.toFixed(2) + '<br>';
        html += '📊 股价在布林带 ' + ind.bollPos.toFixed(0) + '% 处';
        html += '</div>';
        
        resultDiv.innerHTML = html;
        
    } catch(e) {
        resultDiv.innerHTML = '<div class="err">❌ 分析出错: ' + e.message + '</div>';
    }
}
</script>
</body>
</html>
