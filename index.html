<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>股票量化分析</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#c9d1d9;padding:12px;max-width:600px;margin:0 auto}
        .header{text-align:center;padding:15px;background:#161b22;border-radius:12px;margin-bottom:12px}
        .header h1{font-size:20px;color:#58a6ff}
        .input-row{display:flex;gap:8px;margin-bottom:12px}
        .input-row input{flex:1;padding:12px;background:#161b22;border:1px solid#30363d;border-radius:8px;color:#f0f6fc;font-size:16px}
        .input-row select{padding:12px;background:#161b22;border:1px solid#30363d;border-radius:8px;color:#f0f6fc;font-size:14px}
        .btn{width:100%;padding:14px;background:#238636;border:none;color:#fff;font-size:16px;border-radius:8px;cursor:pointer;margin-bottom:15px}
        .btn:active{opacity:.8}
        .card{background:#161b22;border-radius:10px;padding:14px;margin-bottom:10px;border:1px solid#21262d}
        .metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
        .metric{text-align:center;background:#0d1117;padding:10px;border-radius:8px}
        .metric .val{font-size:20px;font-weight:bold;color:#f0f6fc}
        .metric .label{font-size:10px;color:#8b949e}
        .score-bar{background:#21262d;border-radius:10px;height:24px;margin:10px 0;overflow:hidden}
        .score-fill{height:100%;border-radius:10px;transition:width 0.5s}
        .signal{text-align:center;font-size:22px;font-weight:bold;padding:10px}
        .advice{background:#0d1117;padding:12px;border-radius:8px;margin:10px 0;font-size:14px}
        .scores-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
        .score-item{background:#0d1117;padding:8px;border-radius:6px;text-align:center}
        .score-item .sname{font-size:10px;color:#8b949e}
        .score-item .sval{font-size:14px;font-weight:bold}
        .details{font-size:11px;color:#8b949e;line-height:1.8;margin-top:10px}
        .loading{text-align:center;padding:30px;color:#8b949e}
        .spin{display:inline-block;width:24px;height:24px;border:3px solid#21262d;border-top-color:#58a6ff;border-radius:50%;animation:s .8s linear infinite}
        @keyframes s{to{transform:rotate(360deg)}}
        .info{font-size:10px;color:#484f58;text-align:center;margin-top:15px}
    </style>
</head>
<body>
    <div class="header"><h1>📈 股票量化分析</h1></div>
    
    <div class="input-row">
        <input type="text" id="codeInput" placeholder="输入6位股票代码" maxlength="6" value="600172">
        <select id="presetSelect" onchange="selectPreset()">
            <option value="600172">黄河旋风</option>
            <option value="000725">京东方A</option>
            <option value="000791">甘肃能源</option>
            <option value="002176">江特电机</option>
            <option value="605358">立昂微</option>
            <option value="600519">贵州茅台</option>
            <option value="300750">宁德时代</option>
        </select>
    </div>
    
    <button class="btn" onclick="analyze()">🔍 开始分析</button>
    <div id="result"></div>
    <div class="info">数据来源：腾讯财经 · 新浪财经 | 仅供参考</div>

<script>
function selectPreset(){
    document.getElementById('codeInput').value = document.getElementById('presetSelect').value;
}

function pf(c){return c.startsWith('6')?'sh':'sz';}

function jp(url,timeout=8000){
    return new Promise((resolve)=>{
        let cb='_cb'+Date.now()+Math.random().toString(36).slice(2);
        window[cb]=function(d){delete window[cb];resolve(d);};
        let s=document.createElement('script');
        s.src=url+(url.includes('?')?'&':'?')+'callback='+cb;
        s.onerror=()=>{delete window[cb];resolve(null);};
        document.head.appendChild(s);
        setTimeout(()=>{if(window[cb]){delete window[cb];resolve(null);}},timeout);
    });
}

async function getData(code){
    let p=pf(code);
    
    // 实时数据 - 新浪JSONP
    let rt=null;
    try{
        let d=await jp(`https://hq.sinajs.cn/list=${p}${code}`);
        if(d){
            let m=d[`${p}${code}`];
            if(m&&m.price)rt={price:m.price,change:m.changepercent,name:m.name};
        }
    }catch(e){}
    
    // K线数据 - 新浪JSONP
    let kl=null;
    try{
        kl=await jp(`https://money.finance.sina.com.cn/quotes_service/api/json_v2.php/CN_MarketData.getKLineData?symbol=${p}${code}&scale=240&ma=no&datalen=120`);
    }catch(e){}
    
    // 市值 - 腾讯
    let mv=100;
    try{
        let r=await fetch(`https://qt.gtimg.cn/q=${p}${code}`);
        let t=await r.text();
        let m=t.match(/"([^"]*)"/);
        if(m){
            let parts=m[1].split('~');
            if(parts.length>45&&parts[45])mv=parseFloat(parts[45]);
        }
    }catch(e){}
    
    return{rt,kl,mv};
}

function calcIndicators(data){
    if(!data||data.length<70)return null;
    let closes=data.map(d=>d.c);
    let highs=data.map(d=>d.h);
    let lows=data.map(d=>d.l);
    let volumes=data.map(d=>d.v);
    let len=closes.length;
    let last=closes[len-1],prev=closes[len-2];
    
    function sma(arr,n){let s=arr.slice(-n);return s.reduce((a,b)=>a+b,0)/n;}
    function ema(arr,n){let k=2/(n+1),r=arr[0];for(let i=1;i<arr.length;i++)r=arr[i]*k+r*(1-k);return r;}
    
    let ma5=sma(closes,5),ma10=sma(closes,10),ma20=sma(closes,20),ma60=sma(closes,Math.min(60,len));
    let ema12=ema(closes,12),ema26=ema(closes,26);
    let dif=ema12-ema26;
    let deaArr=[],deaVal=0;
    for(let i=0;i<closes.length;i++){
        let e12=ema(closes.slice(0,i+1),12),e26=ema(closes.slice(0,i+1),26);
        deaArr.push(e12-e26);
    }
    deaVal=ema(deaArr,9);
    let macd=2*(dif-deaVal);
    
    let ln=Math.min(9,len),lMin=Math.min(...lows.slice(-ln)),hMax=Math.max(...highs.slice(-ln));
    let rsv=hMax!=lMin?(last-lMin)/(hMax-lMin)*100:50;
    let k=50;for(let i=Math.max(0,len-27);i<len;i++){
        let mn=Math.min(...lows.slice(Math.max(0,i-8),i+1));
        let mx=Math.max(...highs.slice(Math.max(0,i-8),i+1));
        let rs=mx!=mn?(data[i].c-mn)/(mx-mn)*100:50;k=k*2/3+rs*1/3;
    }
    let d=(k+50+50)/3,j=3*k-2*d;
    
    let gains=0,losses=0,rn=Math.min(14,len-1);
    for(let i=len-rn;i<len;i++){let df=data[i].c-data[i-1].c;if(df>0)gains+=df;else losses-=df;}
    let rs=losses>0?(gains/rn)/(losses/rn):100,rsi=100-100/(1+rs);
    
    let bn=Math.min(20,len),bs=closes.slice(-bn),bbm=bs.reduce((a,b)=>a+b,0)/bn;
    let std=Math.sqrt(bs.reduce((s,v)=>s+(v-bbm)**2,0)/bn);
    let bbu=bbm+2*std,bbl=bbm-2*std;
    let bollPos=(last-bbl)/(bbu-bbl)*100;
    
    let vm=volumes.slice(-5).reduce((a,b)=>a+b,0)/5,vr=vm>0?volumes[len-1]/vm:1;
    let pct20=(last-closes[Math.max(0,len-21)])/closes[Math.max(0,len-21)]*100;
    
    return{ma5,ma10,ma20,ma60,dif,dea:deaVal,macd,k,d,j,rsi,bbu,bbl,bbm,bollPos,vr,last,pct20};
}

function getScore(ind,pctChg,turnover,mv){
    if(!ind)return{scores:{},total:0,signal:'数据不足',advice:''};
    let scores={};let k=ind.k,rsi=ind.rsi,close=ind.last;
    
    // 均线
    let ma=0;
    if(close>ind.ma5)ma+=0.3;else ma-=0.3;
    if(close>ind.ma20)ma+=0.4;else ma-=0.4;
    if(ind.ma5>ind.ma10&&ind.ma10>ind.ma20)ma+=1.8;
    else if(ind.ma5<ind.ma10&&ind.ma10<ind.ma20)ma-=1.8;
    scores['均线']=Math.max(-2.5,Math.min(2.5,ma));
    
    // MACD
    let mc=0;
    if(ind.dif>ind.dea)mc+=1.5;else mc-=1.5;
    if(ind.dif>0)mc+=0.3;else mc-=0.3;
    scores['MACD']=Math.max(-2,Math.min(2,mc));
    
    // KDJ
    let kdj=0;
    if(k<20)kdj+=0.5;else if(k>80)kdj-=0.5;
    if(ind.j<0)kdj+=0.3;else if(ind.j>100)kdj-=0.3;
    scores['KDJ']=Math.max(-1.5,Math.min(1.5,kdj));
    
    // RSI
    let rs=0;
    if(rsi<25)rs+=1;else if(rsi<35)rs+=0.5;else if(rsi>75)rs-=1;else if(rsi>65)rs-=0.5;
    scores['RSI']=Math.max(-1,Math.min(1,rs));
    
    // 布林
    let bl=0;
    if(close>=ind.bbm)bl+=0.3;else bl-=0.3;
    if(close<=ind.bbl)bl+=1.5;else if(close>=ind.bbu)bl-=1.5;
    scores['布林']=Math.max(-1.5,Math.min(1.5,bl));
    
    // 换手率
    let tr=0,trv=turnover||0;
    if(trv>=3&&trv<=7)tr+=pctChg>0?0.8:0.3;
    else if(trv>15)tr-=1;
    else if(trv<1)tr-=0.3;
    scores['换手率']=Math.max(-1,Math.min(1,tr));
    
    // 量比
    let vr=0,vrv=ind.vr||1;
    if(vrv>=1.5&&vrv<2.5)vr+=pctChg>0?0.7:-0.3;
    else if(vrv>=5)vr-=1;
    scores['量比']=Math.max(-1,Math.min(1,vr));
    
    let total=Object.values(scores).reduce((a,b)=>a+b,0);
    total=Math.round(total*10)/10;
    
    let signal,advice;
    if(total>=4){signal='✅✅ 强烈买入';advice='多项指标共振向上，可积极建仓。';}
    else if(total>=2){signal='✅ 买入信号';advice='技术面偏多，可适量建仓。';}
    else if(total>=0.5){signal='🟢 偏多持有';advice='趋势偏多但不够强势，持仓持有。';}
    else if(total>-0.5){signal='🔍 观望';advice='多空均衡，建议空仓等待。';}
    else if(total>-2){signal='🟠 偏空谨慎';advice='趋势偏弱，重仓者减仓。';}
    else if(total>-4){signal='❌ 卖出信号';advice='技术面转弱，建议卖出止损。';}
    else{signal='❌❌ 强烈卖出';advice='多项指标共振向下，果断清仓。';}
    
    return{scores,total,signal,advice};
}

async function analyze(){
    let code=document.getElementById('codeInput').value.trim();
    if(!code||code.length!=6||!code.match(/^\d{6}$/)){alert('请输入6位数字股票代码');return;}
    
    let resultDiv=document.getElementById('result');
    resultDiv.innerHTML='<div class="loading"><div class="spin"></div><div style="margin-top:10px;">分析中...</div></div>';
    
    try{
        let{rt,kl,mv}=await getData(code);
        if(!rt){resultDiv.innerHTML='<div class="card" style="color:#f85149">❌ 无法获取实时数据</div>';return;}
        if(!kl||kl.length<70){resultDiv.innerHTML='<div class="card" style="color:#f85149">❌ K线数据不足</div>';return;}
        
        let klData=kl.map(x=>({c:parseFloat(x.close),h:parseFloat(x.high),l:parseFloat(x.low),v:parseFloat(x.volume)}));
        let ind=calcIndicators(klData);
        let pctChg=rt.change||0;
        let turnover=0;
        
        let{rt:rt2}=await getData2(code);
        if(rt2)turnover=rt2.turnover||0;
        
        let{scores,total,signal,advice}=getScore(ind,pctChg,turnover,mv);
        
        let html='';
        html+=`<div class="metrics">
            <div class="metric"><div class="val">¥${rt.price.toFixed(2)}</div><div class="label">现价</div></div>
            <div class="metric"><div class="val" style="color:${pctChg>=0?'#ff6b6b':'#51cf66'}">${pctChg>=0?'+':''}${pctChg.toFixed(2)}%</div><div class="label">涨跌幅</div></div>
            <div class="metric"><div class="val">${mv.toFixed(0)}亿</div><div class="label">总市值</div></div>
        </div>`;
        
        let pct=(total+10)/20*100;
        let color=total>0?'#51cf66':total<0?'#ff6b6b':'#8b949e';
        html+=`<div class="score-bar"><div class="score-fill" style="width:${pct}%;background:${color}"></div></div>`;
        html+=`<div class="signal" style="color:${color}">${signal} <small>(${total>=0?'+':''}${total})</small></div>`;
        html+=`<div class="advice">💡 ${advice}</div>`;
        
        html+='<div class="scores-grid">';
        for(let[name,val]of Object.entries(scores)){
            let c=val>0?'#51cf66':val<0?'#ff6b6b':'#8b949e';
            html+=`<div class="score-item"><div class="sname">${name}</div><div class="sval" style="color:${c}">${val>=0?'+':''}${val.toFixed(1)}</div></div>`;
        }
        html+='</div>';
        
        html+=`<div class="details">
            📊 MA5:${ind.ma5.toFixed(2)} MA10:${ind.ma10.toFixed(2)} MA20:${ind.ma20.toFixed(2)} MA60:${ind.ma60.toFixed(2)}<br>
            📊 MACD: DIF=${ind.dif.toFixed(4)} DEA=${ind.dea.toFixed(4)}<br>
            📊 KDJ: K=${ind.k.toFixed(1)} D=${ind.d.toFixed(1)} J=${ind.j.toFixed(1)}<br>
            📊 RSI(6): ${ind.rsi.toFixed(1)}<br>
            📊 布林: 上轨=${ind.bbu.toFixed(2)} 中轨=${ind.bbm.toFixed(2)} 下轨=${ind.bbl.toFixed(2)}<br>
            📊 股价在布林带 ${ind.bollPos.toFixed(0)}% 处
        </div>`;
        
        resultDiv.innerHTML=html;
    }catch(e){
        resultDiv.innerHTML=`<div class="card" style="color:#f85149">❌ 分析出错: ${e.message}</div>`;
    }
}

async function getData2(code){
    let p=pf(code);
    try{
        let r=await fetch(`https://qt.gtimg.cn/q=${p}${code}`);
        let t=await r.text();
        let m=t.match(/"([^"]*)"/);
        if(m){
            let parts=m[1].split('~');
            if(parts.length>49){
                return{rt:{turnover:parseFloat(parts[38])||0,volRatio:parseFloat(parts[49])||1}};
            }
        }
    }catch(e){}
    return{rt:{turnover:0,volRatio:1}};
}
</script>
</body>
</html>
